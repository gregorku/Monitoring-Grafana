###############################################################################
#
# Monitoring-Grafana Project
#
# File:
#   configs/prometheus/prometheus.yml
#
# Description:
#   Prometheus scrape configuration.
#
###############################################################################

global:

  scrape_interval: 15s

  evaluation_interval: 15s

scrape_configs:

  ###########################################################################
  # Prometheus itself
  ###########################################################################

  - job_name: prometheus

    static_configs:

      - targets:
          - localhost:9090

  ###########################################################################
  # Traefik
  #
  # Requires the "metrics" entryPoint (:8082) and
  # metrics.prometheus block in configs/traefik/traefik.yml
  # (already enabled).
  ###########################################################################

  - job_name: traefik

    static_configs:

      - targets:
          - traefik:8082

  ###########################################################################
  # CrowdSec
  #
  # CrowdSec exposes Prometheus metrics on :6060/metrics
  # by default. If this target shows as "down", check
  # that prometheus.enabled / listen_addr in CrowdSec's
  # config.yaml is set to listen on 0.0.0.0, not 127.0.0.1.
  ###########################################################################

  - job_name: crowdsec

    metrics_path: /metrics

    static_configs:

      - targets:
          - crowdsec:6060

  ###########################################################################
  # Node exporter (hardware / OS metriky serveru)
  ###########################################################################

  - job_name: node_server_domaPc

    static_configs:

      - targets:
          - 10.100.100.100:9100

  ###########################################################################
  # ZFS exporter
  ###########################################################################

  - job_name: zfs_server_domaPc

    static_configs:

      - targets:
          - 10.100.100.100:9134

  ###########################################################################
  # Smartctl exporter (S.M.A.R.T. stav disků)
  ###########################################################################

  - job_name: smartctl_server_domaPc

    static_configs:

      - targets:
          - 10.100.100.100:9633

  ###########################################################################
  # Přidávání dalších serverů/služeb ke sledování
  #
  # Zkopíruj tenhle vzor a uprav job_name + cíl:
  #
  #   - job_name: nazev-sluzby
  #
  #     static_configs:
  #
  #       - targets:
  #           - jmeno-kontejneru:port    # pokud je na stejné síti (bridge-moje / traefik-moje)
  #           - 192.168.1.50:9100        # nebo IP adresa/port, pokud je to mimo Docker (třeba node_exporter na jiném stroji)
  #
  # metrics_path je potřeba jen pokud služba neexpozuje
  # metriky na výchozí cestě "/metrics".
  #
  # Po úpravě: ./scripts/deploy.sh (recreatne Prometheus,
  # ten si config znovu načte), nebo jen
  # "docker exec prometheus kill -HUP 1" pro reload bez restartu.
  ###########################################################################
