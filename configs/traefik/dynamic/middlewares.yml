###############################################################################
#
# Monitoring-Grafana Project
#
# File:
#   configs/traefik/dynamic/middlewares.yml
#
# Description:
#   Middleware chains.
#
###############################################################################

http:

  middlewares:

    #
    # Default middleware chain
    #
    # Applied to most internal services.
    #
    default-chain:

      chain:

        middlewares:

          #
          # Restrict access to trusted networks.
          #
          - ip-whitelist

          #
          # Default HTTP headers.
          #
          - headers-default

          #
          # Additional security headers.
          #
          - headers-security

          #
          # Enable response compression.
          #
          - compress

          #
          # Enable after creating credentials.
          #
          - auth-basic

    #
    # Public middleware chain
    #
    # Used by Internet-facing services.
    #
    public-chain:

      chain:

        middlewares:

          #
          # Redirect HTTP → HTTPS.
          #
          - redirect

          #
          # Default HTTP headers.
          #
          - headers-default

          #
          # Additional security headers.
          #
          - headers-security

          #
          # CrowdSec protection.
          #
          - crowdsec

          #
          # Enable request rate limiting.
          #
          - rate-limit

          #
          # Enable response compression.
          #
          - compress