###############################################################################
#
# Monitoring-Grafana Project
#
# File:
#   configs/traefik/dynamic/prometheus.yml
#
# Description:
#   Prometheus router and service.
#
#   Internal only -- published on its own dedicated
#   "prometheus" entryPoint (:8445 / WireGuard wg1) and
#   protected by default-chain (IP whitelist + BasicAuth),
#   same as the Traefik dashboard and Metabase.
#
###############################################################################

http:

  ###########################################################################
  # Routers
  ###########################################################################

  routers:

    #########################################################################
    # Prometheus
    #########################################################################

    prometheus:

      entryPoints:

        - prometheus

      #
      # Administration URL
      #
      #   https://10.100.100.1:9445/
      #
      # (dedicated port -- no subpath)
      #

      rule: PathPrefix(`/`)

      service: prometheus

      middlewares:

        - default-chain

      tls:

        options: default

      priority: 1

  ###########################################################################
  # Services
  ###########################################################################

  services:

    #########################################################################
    # Prometheus
    #########################################################################

    prometheus:

      loadBalancer:

        passHostHeader: true

        servers:

          - url: http://prometheus:9090
