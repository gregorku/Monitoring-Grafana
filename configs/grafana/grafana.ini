###############################################################################
#
# Monitoring-Grafana Project
#
# File:
#   configs/grafana/grafana.ini
#
# Description:
#   Grafana base configuration.
#
#   Secrets (admin user/password) and the public
#   domain/root URL are injected via environment
#   variables in compose/50-grafana.yml (GF_* vars),
#   not hardcoded here.
#
###############################################################################

[server]
protocol = http
http_port = 3000

[analytics]
reporting_enabled = false
check_for_updates = false
feedback_links_enabled = false

[security]
disable_gravatar = true
cookie_secure = true

[users]
allow_sign_up = false
default_theme = dark

[auth.anonymous]
enabled = false

[log]
mode = console
level = info
