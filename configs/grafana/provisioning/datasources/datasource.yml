apiVersion: 1

datasources:

  - name: Prometheus

    type: prometheus

    access: proxy

    #
    # Reached over the internal bridge-moje network,
    # not through Traefik.
    #

    url: http://prometheus:9090

    isDefault: true

    editable: false
